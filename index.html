<html>

<head>
  <base href="https://websim.ai/c/shopopedia">
  <title>Shopopedia - Your Smart Shopping List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f0f0f0;
      font-size: 14px;
    }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #ffffff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 8px;
    }

    h1 {
      font-size: 18px;
    }

    .add-item {
      padding: 8px;
      background-color: #E8F5E9;
    }

    #new-items {
      width: 100%;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #4CAF50;
      border-radius: 4px;
      min-height: 50px;
      margin-bottom: 6px;
      resize: vertical;
    }

    .button-group {
      display: flex;
      gap: 4px;
    }

    .button-group button {
      flex: 1;
      padding: 6px 5px;
      font-size: 12px;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #add-button { background-color: #4CAF50; }
    #remove-all-button { background-color: #f44336; }
    #toggle-learned-button { background-color: #9C27B0; }

    #shopping-list {
      list-style-type: none;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 5px 8px;
      border-bottom: 1px solid #e0e0e0;
      gap: 4px;
      min-height: 32px;
    }

    .list-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
      font-size: 13px;
    }

    .delete-button {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
    }

    .completed {
      text-decoration: line-through;
      color: #999;
    }

    .category-header {
      background-color: #E8F5E9;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 12px;
      text-transform: capitalize;
      position: sticky;
      top: 0;
    }

    .category-select {
      padding: 2px 3px;
      border: 1px solid #4CAF50;
      border-radius: 4px;
      font-size: 11px;
      flex-shrink: 0;
      max-width: 90px;
    }

    .learned-panel {
      background-color: #FFF3E0;
      padding: 8px;
      margin: 6px;
      border-radius: 6px;
      border: 1px solid #FFCC80;
      font-size: 12px;
    }

    .learned-panel h3 {
      margin-bottom: 6px;
      color: #E65100;
      font-size: 13px;
    }

    .learned-panel p {
      margin-bottom: 6px;
    }

    .suggestion-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px;
      margin: 4px 0;
      background-color: white;
      border-radius: 4px;
    }

    .apply-button, .dismiss-button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .dismiss-button {
      background-color: #9E9E9E;
    }

    .correction-count {
      color: #666;
      font-size: 11px;
    }

    #learned-keywords-panel {
      display: none;
    }
  </style>
</head>

                     'pelenka', 'betét', 'dezodor', 'borotva', 'sütőpapír', 'fólia', 'elem', 'batterija',

    const categoryOrder = [
      'italok',
      'gyumolcs',
      'zoldseg',
      'snackek',
      'pekaru',
      'szarazaruk',
      'fuszerek',
      'haztartasi',
      'egyeb',
      'hus',
      'fagyasztott',
      'tejtermek'
    ];

    const categoryNames = new Map([
      ['zoldseg', 'Zöldségek'],
      ['gyumolcs', 'Gyümölcsök'],
      ['tejtermek', 'Tejtermékek'],
      ['pekaru', 'Pékáru'],
      ['hus', 'Húsok és halak'],
      ['fagyasztott', 'Fagyasztott termékek'],
      ['szarazaruk', 'Szárazáruk'],
      ['fuszerek', 'Fűszerek'],
      ['snackek', 'Snackek és édességek'],
      ['italok', 'Italok'],
      ['haztartasi', 'Háztartási cikkek'],
      ['egyeb', 'Egyéb']
    ]);

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^\p{L}\p{N}]+/gu, ' ')
        .trim();
    }

    function keywordMatches(item, keyword) {
      if (!keyword) return false;
      if (keyword.length <= 3) {
        return new RegExp(`(^|\\s)${keyword}(\\s|$)`).test(item);
      }
      return item.includes(keyword);
    }

    const directCategoryMatches = [
      ['szarazaruk', ['heringfile szoszban', 'eperszalag']],
      ['italok', ['gyumile', 'sio piros gyumi', 'szobi piros szolo', 'bubis viz',
                  'viz mentes bubis', 'mentes bubis']],
      ['fagyasztott', ['hasabburi', 'hasabburgonya', 'halrudacska', 'rantott trappista', 'rantott hal',
                       'ripp ropp nuggets', 'nuggets', 'burgonyaparna', 'serpenyos zoldseg',
                       'azsiai zoldsegkeverek', 'hullamos hasabburgonya', 'inyenc halfile',
                       'heringfile', 'dinofasirt', 'dino fasirt', 'gyumolcsleves alap',
                       'piros gyumolcs keverek', 'ropogos halszeletek', 'brokkoli mix', 'fasirt']],
      ['hus', ['sajtosvirsli', 'virsli sajtos', 'fustli', 'frankfurti', 'fasirt', 'daralthus',

               'halas pastetom', 'heringfile', 'husi', 'gyulai kolbasz szeletelt',
               'karaj csaszarlanccal papszelettel', 'tatra szelet']],
      ['tejtermek', ['tejfol', 'vajkrem', 'kaveszin', 'tejszinhab', 'teavaj', 'turo', 'turogomboc',

                     'sajtkorong', 'trappista', 'apetina', 'parenyica', 'actimel', 'monte',
                     'bords eve sos', 'torta', 'pingui', 'rudi', 'turorudi', 'tejszelet']],
      ['snackek', ['gofri']],
      ['pekaru', ['peksuti', 'hamburgerbuci', 'toastkenyer', 'toast kenyer', 'baguette', 'rozscipo',

      ['szarazaruk', ['szoszpor', 'paradicsompure', 'passzirozott paradicsom', 'bolognai por',

                      'leves teszta', 'leveszoldseg', 'porkoltteszta', 'pöriteszta', 'koretteszta',

                      'harsmez', 'nutella', 'tasakos rizs', 'hars tea', 'harstea', 'forrocsoki',
                      'ludgege', 'mazsola', 'kave', 'kavetejszin', 'tea']],
      ['fuszerek', ['gyros fuszer', 'feketebors', 'fokhagyma granulatum', 'metelohagyma',
                    'vaniliascukor', 'bors orolt']],
      ['gyumolcs', ['gyumi', 'gyumolcs', 'piros gyumi', 'piros gyumolcs', 'afonya', 'szolo']],
      ['zoldseg', ['ubi', 'edesburi', 'krumpli', 'koktelparadicsom', 'mini paradicsom',
                   'szilvaparadicsom', 'leveszoldseg', 'petrezselyemzold', 'csemegekukorica',
                   'savanyukaposzta', 'dudva barninak', 'paprika piros', 'piros paprika']],
      ['italok', ['asvanyviz', 'bubis viz', 'mentes bubis', 'gyumile', 'gyumolcsle', 'almalé',
                  'almale', 'hey ho', 'sio', 'szobi', 'szorp', 'pepsi', 'izesitett sor',
                  'izesitett lotyi', 'sio piros gyumi', 'szobi piros szolo', 'viz mentes bubis',
                  'piros']],
      ['snackek', ['turo rudi', 'turorudi', 'rudi', 'tejszelet', 'pingui', 'tatraszelet',
                   'tatra szelet', 'milka', 'merci', 'kinder', 'csokinyul', 'macichips',
                   'krekermix', 'korpovit']],
      ['haztartasi', ['wc papir', 'papirtorlo', 'zsepi', 'zsebkendo', 'tusfurdo', 'persil',
                      'pellet', 'szena']]
    ];

    const subtractiveMap = new Map(
      Object.entries(productCategories.patterns).map(([cat, p]) => [cat, new Set((p.subtractive || []).map(normalizeText))])
    );

    const keywordsMap = new Map(
      Object.entries(productCategories.patterns).map(([cat, p]) => [cat, p.keywords.map(normalizeText)])
    );

    const pairsMap = new Map(
      Object.entries(productCategories.patterns).map(([cat, p]) => [cat, (p.pairs || []).map(normalizeText)])
    );

    const categories = ['italok', 'snackek', 'pekaru', 'fagyasztott', 'tejtermek', 'hus', 
                        'szarazaruk', 'gyumolcs', 'zoldseg', 'fuszerek', 'haztartasi', 'egyeb'];

    function getCategory(item) {
      const normalizedItem = normalizeText(item);
      
      for (const [keyword, category] of Object.entries(learnedKeywords)) {
        if (normalizedItem.includes(normalizeText(keyword))) {
          return category;
        }
      }
      
      for (const [category, phrases] of directCategoryMatches) {
        if (phrases.some(phrase => normalizedItem.includes(normalizeText(phrase)))) {
          return category;
        }
      }
      
      if (normalizedItem.startsWith('fagyasztott')) {
        return 'fagyasztott';
      }
      
      for (const category of categories) {
        const subtractive = subtractiveMap.get(category);
        if (subtractive && subtractive.size > 0) {
          let shouldSkip = false;
          for (const subKeyword of subtractive) {
            if (keywordMatches(normalizedItem, subKeyword)) {
              shouldSkip = true;
              break;
            }
          }
          if (shouldSkip) continue;
        }
        
        const keywords = keywordsMap.get(category);
        if (keywords) {
          for (const keyword of keywords) {
            if (keywordMatches(normalizedItem, keyword)) {
              return category;
            }
          }
        }
        
        const pairs = pairsMap.get(category);
        if (pairs) {
          for (const pair of pairs) {
            if (keywordMatches(normalizedItem, pair)) {
              return category;
            }
          }
        }
      }
      
      for (const category of categories) {
        const keywords = keywordsMap.get(category);
        if (keywords) {
          for (const keyword of keywords) {
            if (keywordMatches(normalizedItem, keyword)) {
              return category;
            }
          }
        }
      }
      
      return 'egyeb';
    }

    function getCategoryName(category) {
      return categoryNames.get(category) || 'Egyéb';
    }

    function saveItems() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }
    
    function saveCorrections() {
      localStorage.setItem('userCorrections', JSON.stringify(userCorrections));
    }
    
    function saveLearnedKeywords() {
      localStorage.setItem('learnedKeywords', JSON.stringify(learnedKeywords));
    }
    
    function recordCorrection(itemText, oldCategory, newCategory) {
      userCorrections.push({
        item: itemText,
        oldCategory: oldCategory,
        newCategory: newCategory,
        timestamp: Date.now()
      });
      saveCorrections();
      renderSuggestions();
    }

    function renderSuggestions() {
      suggestionsList.innerHTML = '';
      
      // Group corrections by item text
      const correctionMap = {};
      userCorrections.forEach(c => {
        const key = c.item.toLowerCase();
        if (!correctionMap[key]) {
          correctionMap[key] = { item: c.item, corrections: [] };
        }
        correctionMap[key].corrections.push(c);
      });
      
      // Find items corrected multiple times to the same category
      const suggestions = [];
      for (const [key, data] of Object.entries(correctionMap)) {
        const categoryCounts = {};
        data.corrections.forEach(c => {
          categoryCounts[c.newCategory] = (categoryCounts[c.newCategory] || 0) + 1;
        });
        
        for (const [category, count] of Object.entries(categoryCounts)) {
          if (count >= 2) {
            suggestions.push({
              item: data.item,
              category: category,
              count: count,
              oldCategory: data.corrections[0].oldCategory
            });
          }
        }
      }
      
      if (suggestions.length === 0) {
        suggestionsList.innerHTML = '<p>No suggestions yet. Correct item categories to help the app learn.</p>';
        return;
      }
      
      suggestions.forEach(suggestion => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        
        const textWrapper = document.createElement('div');
        const strong = document.createElement('strong');
        strong.textContent = suggestion.item;
        const br = document.createElement('br');
        const span = document.createElement('span');
        span.className = 'correction-count';
        span.textContent = `Corrected ${suggestion.count}× from ${getCategoryName(suggestion.oldCategory)} → ${getCategoryName(suggestion.category)}`;
        textWrapper.appendChild(strong);
        textWrapper.appendChild(br);
        textWrapper.appendChild(span);
        
        const buttonWrapper = document.createElement('div');
        const applyButton = document.createElement('button');
        applyButton.className = 'apply-button';
        applyButton.dataset.item = suggestion.item;
        applyButton.dataset.category = suggestion.category;
        applyButton.textContent = 'Apply';
        buttonWrapper.appendChild(applyButton);
        
        div.appendChild(textWrapper);
        div.appendChild(buttonWrapper);
        suggestionsList.appendChild(div);
      });
      
      document.querySelectorAll('.apply-button').forEach(button => {
        button.addEventListener('click', () => {
          const item = button.dataset.item;
          const category = button.dataset.category;
          learnedKeywords[item.toLowerCase()] = category;
          saveLearnedKeywords();
          renderSuggestions();
          button.textContent = '✓ Applied';
          button.disabled = true;
        });
      });
    }

    function renderList() {
      shoppingList.innerHTML = '';
      const groupedItems = groupItemsByCategory(items);

      for (const category of categoryOrder) {
        if (groupedItems[category] && groupedItems[category].length > 0) {
          const categoryHeader = document.createElement('li');
          categoryHeader.className = 'category-header';
          categoryHeader.textContent = getCategoryName(category);
          shoppingList.appendChild(categoryHeader);

          // Sort items within the category alphabetically
          groupedItems[category].sort((a, b) => a.text.localeCompare(b.text, 'hu'));

          groupedItems[category].forEach((item) => {
            const li = document.createElement('li');
            li.className = 'list-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            if (item.completed) checkbox.checked = true;
            
            const span = document.createElement('span');
            span.className = 'item-text' + (item.completed ? ' completed' : '');
            span.textContent = item.text;
            
            const select = document.createElement('select');
            select.className = 'category-select';
            select.title = 'Change category';
            categoryOrder.forEach(cat => {
              const option = document.createElement('option');
              option.value = cat;
              option.textContent = getCategoryName(cat);
              if (cat === item.category) option.selected = true;
              select.appendChild(option);
            });
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-button';
            deleteBtn.textContent = 'Delete';
            
            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(select);
            li.appendChild(deleteBtn);

            checkbox.addEventListener('change', () => {
              item.completed = checkbox.checked;
              span.classList.toggle('completed', item.completed);
              saveItems();
            });

            select.addEventListener('change', () => {
              const oldCategory = item.category;
              item.category = select.value;
              recordCorrection(item.text, oldCategory, item.category);
              renderList();
              saveItems();
            });

            deleteBtn.addEventListener('click', () => {
              items = items.filter(i => i !== item);
              renderList();
              saveItems();
            });

            shoppingList.appendChild(li);
          });
        }
      }
    }

    function groupItemsByCategory(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.category]) {
          acc[item.category] = [];
        }
        acc[item.category].push(item);
        return acc;
      }, {});
    }

    addButton.addEventListener('click', () => {
      const text = newItemsTextarea.value.trim();
      if (text) {
        const newItems = text.split('\n').filter(item => item.trim() !== '');
        newItems.forEach(itemText => {
          items.push({
            text: itemText.trim(),
            completed: false,
            category: getCategory(itemText.trim())
          });
        });
        newItemsTextarea.value = '';
        renderList();
        saveItems();
      }
    });

    removeAllButton.addEventListener('click', () => {
      if (items.length === 0) return;
      if (confirm('Remove all items from the list?')) {
        items = [];
        renderList();
        saveItems();
      }
    });

    newItemsTextarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        addButton.click();
      }
    });

    // Toggle learned keywords panel
    toggleLearnedButton.addEventListener('click', () => {
      if (learnedPanel.style.display === 'none' || learnedPanel.style.display === '') {
        learnedPanel.style.display = 'block';
        toggleLearnedButton.textContent = 'Hide';
        renderSuggestions();
      } else {
        learnedPanel.style.display = 'none';
        toggleLearnedButton.textContent = 'Learned';
      }
    });

    // Clear all corrections
    clearCorrectionsButton.addEventListener('click', () => {
      if (confirm('Are you sure you want to clear all corrections and learned keywords?')) {
        userCorrections = [];
        learnedKeywords = {};
        saveCorrections();
        saveLearnedKeywords();
        renderSuggestions();
      }
    });

    // Initial render
    renderList();
    renderSuggestions();

    // Add to home screen prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show "Add to Home Screen" button or banner here
    });

    // You can trigger the prompt later when user clicks on your custom "Add to Home" button
    function addToHomeScreen() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the A2HS prompt');
          }
          deferredPrompt = null;
        });
      }
    }
  </script>
</body>

</html>
